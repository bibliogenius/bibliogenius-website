<!DOCTYPE html>
<html lang="{{lang}}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} - BiblioGenius</title>
    <meta name="description" content="{{meta_description}}">

    <meta property="og:type" content="article">
    <meta property="og:title" content="{{title}} - BiblioGenius">
    <meta property="og:description" content="{{meta_description}}">
    <meta property="og:url" content="{{canonical_url}}">
    <meta property="og:site_name" content="BiblioGenius">
    <meta property="og:locale" content="{{og_locale}}">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{{title}} - BiblioGenius">
    <meta name="twitter:description" content="{{meta_description}}">

    <link rel="canonical" href="{{canonical_url}}">
{{hreflang}}

    <link rel="icon" type="image/png" sizes="32x32" href="{{root}}favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="{{root}}favicon-192x192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="{{root}}apple-touch-icon.png">

    <link rel="stylesheet" href="{{root}}styles.css">
    <style>
        .changelog-layout {
            display: flex;
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            gap: 2.5rem;
        }

        /* Version nav */
        .changelog-nav {
            width: 200px;
            flex-shrink: 0;
            position: sticky;
            top: 1.5rem;
            align-self: flex-start;
            max-height: calc(100vh - 3rem);
            overflow-y: auto;
        }

        .changelog-nav h2 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 0.75rem;
        }

        .changelog-nav a {
            display: block;
            padding: 0.3rem 0.75rem;
            color: #374151;
            text-decoration: none;
            font-size: 0.85rem;
            border-radius: 0.375rem;
            border-left: 2px solid transparent;
            transition: background 0.15s, border-color 0.15s;
        }

        .changelog-nav a:hover {
            background: #f3f4f6;
            color: var(--primary-color);
        }

        .changelog-nav a.active {
            background: #eff6ff;
            color: var(--primary-color);
            font-weight: 600;
            border-left-color: var(--primary-color);
        }

        /* Content */
        .changelog-content {
            flex: 1;
            min-width: 0;
        }

        .changelog-content h2 {
            font-size: 1.5rem;
            margin-top: 2.5rem;
            margin-bottom: 0.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #e5e7eb;
            scroll-margin-top: 1.5rem;
        }

        .changelog-content h2:first-child {
            margin-top: 0;
        }

        .changelog-content h2 small {
            font-size: 0.8rem;
            color: #6b7280;
            font-weight: 400;
            margin-left: 0.5rem;
        }

        .changelog-link {
            font-size: 0.75rem;
            font-weight: 400;
            color: #6b7280;
            text-decoration: none;
            padding: 0.15rem 0.4rem;
            border: 1px solid #e5e7eb;
            border-radius: 0.25rem;
            transition: color 0.15s, border-color 0.15s;
        }

        .changelog-link:hover {
            color: var(--primary-color);
            border-color: var(--primary-color);
        }

        .changelog-content ul {
            margin-bottom: 1.5rem;
            padding-left: 1.25rem;
        }

        .changelog-content li {
            margin-bottom: 0.4rem;
            line-height: 1.6;
        }

        .changelog-content li strong {
            color: var(--heading-color);
        }

        .changelog-content code {
            background: #f3f4f6;
            padding: 0.15rem 0.4rem;
            border-radius: 0.25rem;
            font-size: 0.9em;
        }

        /* Mobile */
        .changelog-nav-toggle {
            display: none;
            background: var(--primary-color);
            color: var(--white);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 1rem;
            font-family: inherit;
        }

        @media (max-width: 768px) {
            .changelog-layout {
                flex-direction: column;
                padding: 1.5rem 1rem;
            }

            .changelog-nav {
                width: 100%;
                position: static;
                max-height: none;
                display: none;
            }

            .changelog-nav.open {
                display: block;
            }

            .changelog-nav-toggle {
                display: block;
            }
        }
    </style>
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
            {"@type": "ListItem", "position": 1, "name": "BiblioGenius", "item": "{{breadcrumb_home}}"},
            {"@type": "ListItem", "position": 2, "name": "{{title}}"}
        ]
    }
    </script>
</head>

<body>
    <a href="#main-content" class="skip-link">Skip to content</a>

    <header class="hero" style="padding: 2.5rem 1.5rem;">
        <nav class="site-nav" aria-label="{{nav_site_label}}">
            <a href="{{root}}index.html" class="site-nav-logo">BiblioGenius</a>
            <button class="site-nav-toggle" aria-expanded="false" aria-controls="site-nav-menu" aria-label="Menu">
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
            </button>
            <div class="site-nav-menu" id="site-nav-menu">
                <a href="{{root}}index.html" class="site-nav-link">{{nav_home}}</a>
                <a href="{{root}}story.html" class="site-nav-link">{{nav_story}}</a>
                <a href="{{root}}docs/index.html" class="site-nav-link">{{nav_docs}}</a>
                <a href="{{root}}contribute.html" class="site-nav-link">{{nav_contribute}}</a>
                <a href="{{root}}blog/" class="site-nav-link">{{nav_blog}}</a>
                <select onchange="location.href=this.value" class="lang-select" aria-label="{{lang_label}}">
{{lang_switcher}}
                </select>
            </div>
        </nav>
        <div class="hero-content">
            <h1>{{hero_title}}</h1>
            <p>{{hero_subtitle}}</p>
        </div>
    </header>

    <main id="main-content">
        <div class="changelog-layout">
            <button class="changelog-nav-toggle" aria-expanded="false" aria-controls="changelog-nav" aria-label="Versions">
                &#9776; Versions
            </button>

            <nav class="changelog-nav" id="changelog-nav" aria-label="Versions">
                <h2>Versions</h2>
{{version_nav}}
            </nav>

            <article class="changelog-content">
{{content}}
            </article>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>{{footer_text}}</p>
        </div>
    </footer>

    <script>
    (function() {
        var navToggle = document.querySelector('.site-nav-toggle');
        var navMenu = document.getElementById('site-nav-menu');
        if (navToggle && navMenu) {
            navToggle.addEventListener('click', function() {
                var isOpen = navMenu.classList.toggle('open');
                navToggle.setAttribute('aria-expanded', isOpen);
            });
            navMenu.querySelectorAll('.site-nav-link').forEach(function(a) {
                a.addEventListener('click', function() {
                    navMenu.classList.remove('open');
                    navToggle.setAttribute('aria-expanded', 'false');
                });
            });
        }
    })();
    </script>
    <script>
    (function() {
        var nav = document.getElementById('changelog-nav');
        var toggle = document.querySelector('.changelog-nav-toggle');
        if (toggle && nav) {
            toggle.addEventListener('click', function() {
                var isOpen = nav.classList.toggle('open');
                toggle.setAttribute('aria-expanded', isOpen);
            });
            nav.querySelectorAll('a').forEach(function(a) {
                a.addEventListener('click', function() {
                    nav.classList.remove('open');
                    toggle.setAttribute('aria-expanded', 'false');
                });
            });
        }

        // Highlight active version on scroll
        var headings = document.querySelectorAll('.changelog-content h2[id]');
        var links = nav ? nav.querySelectorAll('a') : [];
        if (headings.length && links.length) {
            var observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        links.forEach(function(l) { l.classList.remove('active'); });
                        var active = nav.querySelector('a[href="#' + entry.target.id + '"]');
                        if (active) active.classList.add('active');
                    }
                });
            }, { rootMargin: '-20% 0px -60% 0px' });
            headings.forEach(function(h) { observer.observe(h); });
        }
    })();
    </script>
</body>

</html>
