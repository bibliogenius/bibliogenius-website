# -- Carte Bug --
bug_title: Signaler un bug
bug_desc: BiblioGenius est un logiciel libre. Vous pouvez signaler un bug ou proposer une amélioration sur notre forge ouverte Codeberg.
btn_bug: Signaler un bug sur Codeberg

# -- FAQ --
faq_title: Questions fréquentes
faq_q1: BiblioGenius est-il gratuit ?
faq_a1: Oui. L'application est entièrement gratuite et open source, publiée sous licence AGPL-3.0.
faq_q2: Où sont stockées mes données ?
faq_a2: Vos données restent stockées localement sur votre appareil. Rien n'est envoyé à un serveur sans une action de votre part. Voir le guide <a href='docs/privacy-data.html'>Confidentialité des données</a>.
faq_q3: Sur quelles plateformes BiblioGenius fonctionne-t-il ?
faq_a3: BiblioGenius est disponible sur iOS, Android, macOS, Windows et Linux.
faq_q4: Comment me connecter à la bibliothèque d'un autre lecteur ?
faq_a4: Vous pouvez vous connecter via un QR code ou un lien d'invitation. Voir le guide <a href='docs/connect-friends.html'>Se connecter avec des amis</a>.

