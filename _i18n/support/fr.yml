bug_desc: BiblioGenius est un logiciel libre. Vous pouvez signaler un bug ou proposer une amelioration sur notre forge ouverte Codeberg.
btn_bug: Ouvrir un ticket sur Codeberg

# -- FAQ --
faq_title: Questions frequentes
faq_q1: BiblioGenius est-il gratuit ?
faq_a1: Oui. L'application est entierement gratuite et open source, publiee sous licence AGPL-3.0.
faq_q2: Ou sont stockees mes donnees ?
faq_a2: Vos donnees restent stockees localement sur votre appareil. Rien n'est envoye a un serveur sans une action de votre part. Voir le guide <a href='docs/privacy-data.html'>Confidentialite des donnees</a>.
faq_q3: Sur quelles plateformes BiblioGenius fonctionne-t-il ?
faq_a3: BiblioGenius est disponible sur iOS, Android, macOS, Windows et Linux.
faq_q4: Comment me connecter a la bibliotheque d'un autre lecteur ?
faq_a4: Vous pouvez vous connecter via un QR code ou un lien d'invitation. Voir le guide <a href='docs/connect-friends.html'>Se connecter avec des amis</a>.

