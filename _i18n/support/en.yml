# -- FAQ --
faq_title: Frequently asked questions
faq_q1: Is BiblioGenius free?
faq_a1: Yes. The app is completely free and open source, released under the AGPL-3.0 license.
faq_q2: Where is my data stored?
faq_a2: Your data stays stored locally on your device. Nothing is sent to a server without an action from you. See the <a href='docs/privacy-data.html'>Data privacy</a> guide.
faq_q3: Which platforms does BiblioGenius support?
faq_a3: BiblioGenius is available on iOS, Android, macOS, Windows and Linux.
faq_q4: How do I connect to another reader's library?
faq_a4: You can connect via a QR code or an invitation link. See the <a href='docs/connect-friends.html'>Connect with friends</a> guide.

